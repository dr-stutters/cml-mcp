  PRI-LAN:
    definition: iol-xe
    config: |-
      hostname PRI-LAN
      !
      interface Loopback0
       ip address 10.71.100.1 255.255.255.0
       ip ospf network point-to-point
      !
      interface Loopback1
       ip address 10.71.101.1 255.255.255.0
       ip ospf network point-to-point
      !
      interface Ethernet0/0
       ip address 10.71.0.2 255.255.255.0
       no shutdown
      !
      router ospf 1
       router-id 10.71.0.2
       network 10.71.0.0 0.0.0.255 area 0
