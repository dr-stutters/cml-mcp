# Firewall SD-WAN CVD lab - declarative topology spec (topology-as-code).
# Rebuild with ONE call:  build_lab_from_spec(spec=<this file>)   (cml MCP)
# Validate first with:    validate_lab_spec / build_lab_from_spec(dry_run=True)
#
# Exported via export_lab_spec from the live, validated lab (a7377830,
# 'firewall-sdwan-cvd'): 6-site Secure Firewall SD-WAN - NYC hub (+ NYC HA pair
# and secondary hub NNJ), dual ISP underlay (ECMP), per-site branch LANs
# (OSPF / EIGRP / eBGP redistribution). The ISP/LAN routers' day-0 below IS the
# validated end-state config (they come up ready); the FTD/FMC side boots with
# day-0 JSON only - the SD-WAN overlay (auto-VPN, ECMP, PBR, HA) is applied via
# the FMC REST API per runbook.md / design-brief.md in this folder.
#
# NOTE: FTD day-0 mgmt IPs (.23-.26, .31-.34), FMC .11, and the RegKey are
# lab-specific - adjust for your environment.
version: 1
lab:
  title: firewall-sdwan-cvd
  description: 'Firewall SD-WAN CVD validation: DIA/PBR/path-monitoring/ECMP'
defaults:
  definition: unmanaged_switch
