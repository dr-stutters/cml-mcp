      !
      interface Loopback0
       ip address 10.74.100.1 255.255.255.0
      !
      interface Loopback1
       ip address 10.74.101.1 255.255.255.0
      !
      interface Ethernet0/0
       ip address 10.74.0.2 255.255.255.0
       no shutdown
      !
      route-map SET-COMM-OUT permit 10
       set community 1000
      !
      router bgp 65100
       bgp log-neighbor-changes
       network 10.74.100.0 mask 255.255.255.0
       network 10.74.101.0 mask 255.255.255.0
       neighbor 10.74.0.1 remote-as 65070
       neighbor 10.74.0.1 send-community
       neighbor 10.74.0.1 route-map SET-COMM-OUT out
