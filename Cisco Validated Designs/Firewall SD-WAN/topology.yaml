      !
      interface Loopback1
       ip address 10.73.101.1 255.255.255.0
      !
      interface Ethernet0/0
       ip address 10.73.0.2 255.255.255.0
       no shutdown
      !
      router eigrp 100
       no auto-summary
       network 10.73.0.0 0.0.0.255
       network 10.73.100.0 0.0.0.255
       network 10.73.101.0 0.0.0.255
      !
