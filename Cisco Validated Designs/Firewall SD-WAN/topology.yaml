groups:
  firewalls:
    agent: firewall-engineer
    nodes: [FMC1, PRI-FW, WMA-FW, NCT-FW, MCT-FW, NYC-FW-2, NYC-FW-3, NNJ-FW-2, NNJ-FW-3]
    addressing: |
      Mgmt (198.18.128.0/18 via MGMT-EXT): FMC1 .11; FTDs .23-.26 (PRI/WMA/NCT/MCT),
      .31-.34 (NYC-FW-2, NNJ-FW-2, NYC-FW-3, NNJ-FW-3); FmcRegKey cisco123key.
      Underlay: ISP1 172.16.1.0/24 (gw .254), ISP2 172.16.2.0/24 (gw .254).
      Site LANs: PRI 10.71.0.0/24 (OSPF), NCT 10.73.0.0/24 (EIGRP), MCT 10.74.0.0/24 (eBGP 65100).
    tasks: |
      Follow Cisco Validated Designs/Firewall SD-WAN/runbook.md: wait for FMC1 API
      (15-30 min), confirm all 8 FTDs auto-register (day-0 carries FmcIp/RegKey),
      then build the SD-WAN overlay via the FMC REST API - auto-VPN hub-and-spoke
      VTIs from the NYC hub, iBGP AS 65070 overlay, dual-ISP ECMP (enableMultiPath),
      branch LAN redistribution (OSPF/EIGRP/eBGP), secondary hub NNJ, and the
      NYC-FW-2/3 HA pair.
    acceptance: |
      All FTDs registered + healthy in FMC; hub-spoke VTI tunnels UP; iBGP overlay
      established; LAN-to-LAN pings between all site loopbacks (10.7x.100/101.x);
      ECMP failover survives one ISP down; HA pair Active/Standby healthy.
  underlay-and-lans:
    agent: catalyst-engineer
    nodes: [ISP1-RTR, ISP2-RTR, PRI-LAN, NCT-LAN, MCT-LAN]
    tasks: |
      Day-0 already carries the validated configs (ISP gateway addressing; per-site
      OSPF/EIGRP/BGP LAN routing). Verify only - do not reconfigure.
    acceptance: |
      ISP gateways answer from the FTD outside subnets; each LAN router forms its
      IGP/BGP adjacency with its site FTD once the firewalls are provisioned.
