# Firepower SGT Enforcement - topology-as-code
#
# The canonical ISE 3.5 NAC/TrustSec core (cat9000v-uadp access switch + Alpine
# endpoint, OOB mgmt bridged to the underlay) PLUS the Firepower SGT-enforcement
# tier (FMC-managed FTD + protected server). Rebuild the TOPOLOGY with
# build_lab_from_spec; apply feature config per runbook.md + modules/pxgrid-gui-workflow.md.
#
# Enforcement chain (proven end-to-end 2026-07-15): ISE assigns an SGT at MAB ->
# ISE static IP-SGT binding -> FMC<->ISE pxGrid (SXP topic) -> FTD Snort ->
# SGT-based ACP (Employees permit / Contractors deny to the server).
#
# Lab facts (creds are throwaway isolated-lab values; same convention as sibling specs):
#   SW-ISE35 (cat9000v): NAD source = Vlan100 SVI 198.18.128.66/18, Mgmt-vrf Gi0/0 .62;
#     RADIUS/CoA to ISE 3.5 198.18.134.35, key ISEsecret123.
#   EP-ISE35 -> 10.40.0.10 (Vlan40), SGT Employees(4) via MAB.
#   FMC-SGT 198.18.128.13 (admin / SgtLab#2026Fw); FTD-SGT mgmt 198.18.128.27,
#     FmcRegKey sgtreg123; FTD inside 10.50.0.2/30 (Gi0/0 -> switch Gi1/0/4),
#     outside 10.60.0.1/24; SRV-SGT 10.60.0.10.
#
# NOT in this day-0 (apply from the runbook after the lab boots):
#   - Switch SGT-tier: Vlan40 SVI 10.40.0.1, inside Gi1/0/4 10.50.0.1,
#     route 10.60.0.0/24 -> 10.50.0.2 (captured switch config is NAC-core only -
#     export stores day-0, and the SGT-tier bits were added at runtime).
#   - All FMC/FTD feature config (interfaces/zones, the SGT-ACP, the ISE pxGrid
#     integration) lives in the FMC DB, not the topology.
#   - SRV-SGT is net-tools/runtime: ip addr add 10.60.0.10/24 dev eth0; ip route add default via 10.60.0.1.
#
# Captured by export_lab_spec from lab cb53d7fe-... (ISE35-MAB), 2026-07-15.

