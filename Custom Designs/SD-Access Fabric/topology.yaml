  HOST1:
    definition: alpine
    x: 100
    y: 450

  MGMT-SW:
    definition: unmanaged_switch
    config: 'mode: Bridge'
    x: 300
    y: 100

  EXT:
    definition: external_connector
    config: System Bridge
    x: 500
    y: 100

links:
# management plane: each network device's mgmt NIC -> unmanaged switch -> System Bridge -> /18
- EXT:port -- MGMT-SW:port0
- MGMT-SW:port1 -- FUSION-R1:GigabitEthernet1
- MGMT-SW:port2 -- BORDER-CP:GigabitEthernet0/0
- MGMT-SW:port3 -- EDGE1:GigabitEthernet0/0
# fabric underlay (OSPF area 0) + external handoff
- EDGE1:GigabitEthernet1/0/1 -- BORDER-CP:GigabitEthernet1/0/1
- BORDER-CP:GigabitEthernet1/0/2 -- FUSION-R1:GigabitEthernet2
# endpoint on the fabric edge (alpine interfaces are eth0-eth3, NOT port0)
- HOST1:eth0 -- EDGE1:GigabitEthernet1/0/3
