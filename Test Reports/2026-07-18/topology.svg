<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Helvetica,Arial,sans-serif">
<rect x="0" y="0" width="1000" height="620" fill="#ffffff"/>
<defs>
<marker id="ar-b" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/></marker>
<marker id="ar-r" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/></marker>
<marker id="ar-g" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#15803d"/></marker>
</defs>

<text x="24" y="30" font-size="14.5" font-weight="800" fill="#0f2036">SDA-Fabric &#8212; Secure Firewall depth + Cisco Security Cloud observability</text>
<text x="24" y="48" font-size="9.2" fill="#64748b">CAMPUS traffic (HOST1/alice) is PBR-steered through the FTD for deep inspection; FTD syslog (UDP 5514) and FMC eStreamer (TCP 8302) feed the Cisco Security Cloud dashboard on Splunk.</text>

<!-- data-plane path labels -->
<text x="150" y="486" text-anchor="middle" font-size="7.6" fill="#64748b">802.1X / MAB</text>
<text x="326" y="486" text-anchor="middle" font-size="7.6" fill="#64748b">VXLAN fabric</text>
<text x="502" y="486" text-anchor="middle" font-size="7.6" fill="#64748b">L3 handoff</text>
<text x="678" y="486" text-anchor="middle" font-size="7.6" fill="#64748b">PBR &#8594; FTD inside</text>

<!-- data plane connectors -->
<line x1="152" y1="530" x2="196" y2="530" stroke="#94a3b8" stroke-width="1.6"/>
<line x1="328" y1="530" x2="372" y2="530" stroke="#94a3b8" stroke-width="1.6"/>
<line x1="504" y1="530" x2="548" y2="530" stroke="#94a3b8" stroke-width="1.6"/>
<line x1="680" y1="530" x2="724" y2="530" stroke="#94a3b8" stroke-width="1.6"/>

<!-- data-plane nodes (bottom row) -->
<rect x="16" y="500" width="136" height="62" rx="7" fill="#eef6ef" stroke="#15803d" stroke-width="1.6"/>
<text x="84" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2a37">HOST1 / alice</text>
<text x="84" y="531" text-anchor="middle" font-size="8.4" fill="#64748b">alpine endpoint</text>
<text x="84" y="543" text-anchor="middle" font-size="8.4" fill="#64748b">CAMPUS 172.16.10.50</text>
<text x="84" y="555" text-anchor="middle" font-size="8.4" fill="#64748b">no Internet (C12/C15 config-only)</text>

<rect x="196" y="500" width="132" height="62" rx="7" fill="#f4f6f9" stroke="#334155" stroke-width="1.6"/>
<text x="262" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2a37">EDGE1</text>
<text x="262" y="531" text-anchor="middle" font-size="8.4" fill="#64748b">cat9000v fabric edge</text>
<text x="262" y="543" text-anchor="middle" font-size="8.4" fill="#64748b">edge-auth reload-fixed</text>
<text x="262" y="555" text-anchor="middle" font-size="8.4" fill="#64748b">mgmt 198.18.128.73</text>

<rect x="372" y="500" width="132" height="62" rx="7" fill="#f4f6f9" stroke="#334155" stroke-width="1.6"/>
<text x="438" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2a37">BORDER-CP</text>
<text x="438" y="531" text-anchor="middle" font-size="8.4" fill="#64748b">cat9000v CP + border</text>
<text x="438" y="543" text-anchor="middle" font-size="8.4" fill="#64748b">LISP map-server</text>
<text x="438" y="555" text-anchor="middle" font-size="8.4" fill="#64748b">198.18.128.72</text>

<rect x="548" y="500" width="132" height="62" rx="7" fill="#f4f6f9" stroke="#334155" stroke-width="1.6"/>
<text x="614" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2a37">FUSION-R1</text>
<text x="614" y="531" text-anchor="middle" font-size="8.4" fill="#64748b">cat8000v fusion</text>
<text x="614" y="543" text-anchor="middle" font-size="8.4" fill="#64748b">PBR &#8594; FTD inside</text>
<text x="614" y="555" text-anchor="middle" font-size="8.4" fill="#64748b">198.18.128.71</text>

<!-- FTD (the inspection engine) -->
<rect x="724" y="470" width="176" height="122" rx="8" fill="#fdf0ee" stroke="#b91c1c" stroke-width="1.8"/>
<text x="812" y="490" text-anchor="middle" font-size="13" font-weight="800" fill="#1f2a37">FTDv</text>
<text x="812" y="503" text-anchor="middle" font-size="8.4" fill="#64748b">Secure Firewall TD (Snort 3)</text>
<text x="812" y="515" text-anchor="middle" font-size="8.4" fill="#64748b">mgmt .81 &#183; data outside .82</text>
<line x1="736" y1="521" x2="888" y2="521" stroke="#f1c9c2" stroke-width="1"/>
<text x="812" y="533" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">deep inspection</text>
<text x="812" y="545" text-anchor="middle" font-size="7.8" fill="#7f1d1d">C6 IPS &#183; C9 Malware(EICAR)</text>
<text x="812" y="556" text-anchor="middle" font-size="7.8" fill="#7f1d1d">C12 URL &#183; C13 AVC &#183; C14 EVE</text>
<text x="812" y="567" text-anchor="middle" font-size="7.8" fill="#7f1d1d">C15 Geo &#183; C16 TLS-decrypt bypass</text>
<text x="812" y="581" text-anchor="middle" font-size="7.6" fill="#64748b">DEPLOYED &#183; MANAGED &#183; 0 pending</text>

<!-- management / telemetry plane (top) -->
<rect x="700" y="70" width="150" height="66" rx="7" fill="#eef3fe" stroke="#1d4ed8" stroke-width="1.6"/>
<text x="775" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2a37">FMCv</text>
<text x="775" y="103" text-anchor="middle" font-size="8.4" fill="#64748b">Mgmt Center 198.18.128.80</text>
<text x="775" y="115" text-anchor="middle" font-size="8.4" fill="#64748b">SDA-ACP / SDA-Decrypt</text>
<text x="775" y="127" text-anchor="middle" font-size="8.4" fill="#64748b">eStreamer source :8302</text>

<rect x="360" y="70" width="168" height="86" rx="8" fill="#eef3fe" stroke="#1d4ed8" stroke-width="1.8"/>
<text x="444" y="90" text-anchor="middle" font-size="13" font-weight="800" fill="#1f2a37">SPLUNK (SIEM)</text>
<text x="444" y="103" text-anchor="middle" font-size="8.4" fill="#64748b">198.18.128.51 &#183; Splunk 10.4.0</text>
<text x="444" y="115" text-anchor="middle" font-size="8.4" fill="#64748b">Cisco Security Cloud 4.0</text>
<text x="444" y="127" text-anchor="middle" font-size="8.4" fill="#64748b">Secure Firewall dashboard</text>
<text x="444" y="139" text-anchor="middle" font-size="8.2" fill="#15803d">Cisco_Security data model</text>
<text x="444" y="150" text-anchor="middle" font-size="8.2" fill="#15803d">Conn 606 &#183; IPS 27 &#183; File 25 &#183; Malware 17</text>

<rect x="724" y="290" width="150" height="60" rx="7" fill="#eef6ef" stroke="#15803d" stroke-width="1.6"/>
<text x="799" y="310" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f2a37">ISE 3.5</text>
<text x="799" y="323" text-anchor="middle" font-size="8.4" fill="#64748b">198.18.134.35 (net-ise)</text>
<text x="799" y="335" text-anchor="middle" font-size="8.4" fill="#64748b">C16 decrypt-bypass dst</text>
<text x="799" y="346" text-anchor="middle" font-size="8" fill="#15803d">issuer CN=Mitchcloud-Lab-Root-CA</text>

<!-- telemetry arrows -->
<!-- FTD data .82 -> Splunk 5514 -->
<path d="M724 500 C 560 470, 470 300, 444 156" fill="none" stroke="#b45309" stroke-width="2.0" stroke-dasharray="6 4" marker-end="url(#ar-r)"/>
<text x="516" y="330" text-anchor="middle" font-size="8.6" font-weight="700" fill="#b45309" transform="rotate(-70 516 330)">FTD syslog UDP 5514 &#8594; cisco:ftd:*</text>

<!-- FMC .80 -> Splunk 8302 eStreamer -->
<line x1="700" y1="110" x2="530" y2="110" stroke="#1d4ed8" stroke-width="2.0" stroke-dasharray="6 4" marker-end="url(#ar-b)"/>
<text x="614" y="103" text-anchor="middle" font-size="8.6" font-weight="700" fill="#1d4ed8">eStreamer TCP 8302 &#8594; cisco:sfw:estreamer</text>

<!-- FMC manages FTD -->
<line x1="800" y1="136" x2="812" y2="470" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 3"/>
<text x="828" y="300" text-anchor="middle" font-size="7.8" fill="#94a3b8" transform="rotate(90 828 300)">manages / deploys</text>

<!-- FTD inspects ISE-bound 443 (decrypt bypass) -->
<line x1="812" y1="470" x2="805" y2="350" stroke="#15803d" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar-g)"/>

<!-- legend -->
<rect x="24" y="196" width="300" height="70" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="34" y="212" font-size="8.6" font-weight="700" fill="#334155">Legend</text>
<line x1="34" y1="224" x2="58" y2="224" stroke="#b45309" stroke-width="2" stroke-dasharray="6 4"/>
<text x="64" y="227" font-size="8" fill="#475569">FTD syslog &#8594; Splunk UDP 5514 (V7)</text>
<line x1="34" y1="238" x2="58" y2="238" stroke="#1d4ed8" stroke-width="2" stroke-dasharray="6 4"/>
<text x="64" y="241" font-size="8" fill="#475569">FMC eStreamer &#8594; Splunk TCP 8302 (V8)</text>
<line x1="34" y1="252" x2="58" y2="252" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 3"/>
<text x="64" y="255" font-size="8" fill="#475569">FMC management / deploy</text>
</svg>
